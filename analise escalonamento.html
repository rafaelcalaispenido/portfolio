<style>
:root{
  --primary:#00B2AA;--primary-dark:#008F88;--primary-light:#E6F8F7;--primary-mid:#00C9C0;
  --accent:#F4693B;--accent-light:#FDF0EB;
  --purple:#8B2FC9;
  --bg:#F4F6F9;--surface:#FFFFFF;--surface2:#F8FAFA;
  --text:#2D3748;--text2:#5A6A7A;--text3:#A0ADB8;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,178,170,0.25);
  --green:#10B981;--green-bg:#ECFDF5;
  --yellow:#F59E0B;--yellow-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,178,170,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{background:#fff;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;border-bottom:2px solid var(--primary);box-shadow:0 2px 12px rgba(0,178,170,.1)}
.header-logo{display:flex;align-items:center;height:40px}
.header-logo img{height:36px;width:auto;object-fit:contain}
.logo-placeholder{height:36px;display:flex;align-items:center;padding:4px 10px;border-radius:6px}
.logo-hm{background:var(--accent);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px}
.logo-en{background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
.header-center{display:flex;flex-direction:column;align-items:center}
.header-title{color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;letter-spacing:.3px}
.header-sub{color:var(--text3);font-size:11px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--primary-light);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--primary-dark);font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:.15s}
.hdr-btn:hover{background:var(--primary);color:#fff}
.hdr-badge{font-size:11px;background:var(--primary-light);color:var(--primary-dark);padding:4px 12px;border-radius:20px;white-space:nowrap;border:1px solid var(--border2);font-weight:600}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{width:230px;min-width:230px;background:#fff;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(0,178,170,.15)}
.sb-agent-area{padding:12px;border-bottom:1px solid rgba(0,178,170,.12);background:var(--primary-light)}
.sb-label{color:var(--primary-dark);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px}
.agent-pills{display:flex;flex-direction:column;gap:4px}
.agent-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:.12s;border:1px solid transparent}
.agent-pill:hover{background:rgba(0,178,170,.08)}
.agent-pill.active-rapha{background:var(--primary-light);border-color:var(--border2)}
.agent-pill.active-calais{background:#FDF0EB;border-color:rgba(244,105,59,.3)}
.agent-pill.active-ale{background:#FFFBEB;border-color:rgba(245,158,11,.3)}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill-name{color:var(--text);font-size:13px;font-weight:600;flex:1;font-family:'Nunito',sans-serif}
.pill-count{font-size:11px;color:var(--text3)}
.sb-list{flex:1;overflow-y:auto;padding:8px;background:#FAFCFC}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-track{background:transparent}
.sb-list::-webkit-scrollbar-thumb{background:rgba(0,178,170,.2);border-radius:4px}
.sb-grupo-label{color:var(--primary-dark);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:8px 6px 4px;display:flex;justify-content:space-between;align-items:center}
.sb-grupo-count{font-size:9px;background:var(--primary-light);padding:2px 6px;border-radius:10px;color:var(--primary-dark);border:1px solid var(--border2)}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:.1s;margin-bottom:1px;border:1px solid transparent}
.sb-item:hover{background:var(--primary-light)}
.sb-item.active{background:var(--primary-light);border-color:var(--border2)}
.sb-item.done{opacity:.6}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:.2s}
.sb-dot.d-pending{background:#D1D5DB}
.sb-dot.d-done-rapha{background:var(--primary)}
.sb-dot.d-done-calais{background:var(--accent)}
.sb-dot.d-done-ale{background:#F59E0B}
.sb-dot.d-active{background:var(--primary)}
.sb-id{font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--text);flex:1}
.sb-cat{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px}

/* ── MAIN ── */
.main-area{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}

/* Loading */
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--en-teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Home */
.home-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.home-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 36px;max-width:520px;width:100%}
.home-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.home-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5}
.home-agent-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:8px;transition:.12s;background:var(--surface)}
.home-agent-card:hover{border-color:var(--primary);background:var(--primary-light)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:'Nunito',sans-serif}
.av-rapha{background:var(--primary);color:#fff}
.av-calais{background:var(--accent);color:#fff}
.av-ale{background:var(--yellow);color:#fff}
.av-info{flex:1}
.av-name{font-weight:700;font-size:14px;font-family:'Nunito',sans-serif;margin-bottom:3px}
.av-stat{font-size:12px;color:var(--text2)}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.prog-bar{flex:1;background:var(--border2);border-radius:4px;height:4px}
.prog-fill{height:4px;border-radius:4px;transition:width .4s}
.pf-rapha{background:var(--primary)}
.pf-calais{background:var(--accent)}
.pf-ale{background:var(--yellow)}
.prog-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.home-export-btn{display:block;width:100%;margin-top:16px;padding:9px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;text-align:center;font-family:inherit;transition:.12s}
.home-export-btn:hover{border-color:var(--primary);color:var(--primary-dark)}

/* Analyze */
.analyze-wrap{padding:20px;max-width:780px;margin:0 auto;width:100%}
.ticket-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.ticket-id-big{font-family:'Nunito',sans-serif;font-size:22px;font-weight:700;color:var(--text)}
.ticket-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.t-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-weight:500}
.t-badge-cat{background:var(--primary-light);border-color:var(--border2);color:var(--primary-dark)}
.t-badge-done{background:var(--green-bg);border-color:rgba(16,185,129,.3);color:var(--green)}
.section-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:12px}
.section-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.section-num{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.q-block{margin-bottom:14px}
.q-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.q-sub{font-size:12px;color:var(--text2);margin-bottom:6px;margin-top:-4px}
.radio-row{display:flex;gap:6px;flex-wrap:wrap}
.ropt{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:.1s;color:var(--text2);user-select:none;font-family:inherit}
.ropt:hover{border-color:var(--en-teal);color:var(--en-teal-dark)}
.ropt.sel-sim{background:#D1FAE5;border-color:rgba(16,185,129,.7);color:#065F46;font-weight:700}
.ropt.sel-nao{background:#FEE2E2;border-color:rgba(239,68,68,.7);color:#991B1B;font-weight:700}
.ropt.sel-na{background:#E0E7FF;border-color:rgba(99,102,241,.6);color:#3730A3;font-weight:700}
.ropt.sel-dentro{background:#D1FAE5;border-color:rgba(16,185,129,.7);color:#065F46;font-weight:700}
.ropt.sel-abaixo{background:#FEF3C7;border-color:rgba(245,158,11,.7);color:#78350F;font-weight:700}
.ropt.sel-acima{background:#FEE2E2;border-color:rgba(239,68,68,.7);color:#991B1B;font-weight:700}
.ropt.sel-gen{background:#EDE9FE;border-color:rgba(139,47,201,.6);color:#5B21B6;font-weight:700}
textarea.tinput{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);font-size:13px;color:var(--text);resize:vertical;min-height:60px;font-family:inherit;margin-top:8px;transition:.15s;line-height:1.5}
textarea.tinput:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(0,178,170,.12)}
textarea.tinput::placeholder{color:var(--text3)}
.act-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;padding:16px 20px;background:var(--surface);border-top:1px solid var(--border);position:sticky;bottom:0;border-radius:0 0 var(--radius) var(--radius)}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;font-family:inherit;border:1px solid transparent}
.btn:active{transform:scale(.98)}
.btn-teal{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-teal:hover{background:var(--primary-dark)}
.btn-teal:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--en-teal);color:var(--en-teal-dark)}
.btn-outline:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:none;color:var(--text3);font-size:12px;padding:9px 12px}
.btn-ghost:hover{color:var(--text2)}
.spacer{flex:1}
.done-banner{background:var(--green-bg);border:1px solid rgba(16,185,129,.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:8px}
.done-banner::before{content:"✓";width:20px;height:20px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* Export */
.export-wrap{padding:24px;max-width:700px;margin:0 auto;width:100%}
.export-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.export-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;text-align:center}
.stat-val{font-family:'Nunito',sans-serif;font-size:24px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.exp-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:10px}
.exp-card-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.exp-card-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.exp-prog{margin-top:14px}
.exp-agent-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.exp-av{width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Nunito',sans-serif}
.exp-name{font-size:13px;font-weight:600;width:60px}
.exp-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:6px}
.exp-bar-fill{height:6px;border-radius:4px}
.exp-stat{font-size:12px;color:var(--text2);min-width:60px;text-align:right}

/* Config banner */


@media(max-width:640px){
  .sidebar{width:180px;min-width:180px}
  .analyze-wrap,.export-wrap{padding:12px}
}

/* ── CALIBRATION ─────────────────────────────────────────────── */
.tab-nav-bar{display:flex;border-bottom:2px solid var(--primary);background:#fff;flex-shrink:0}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.12s;font-family:inherit}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
#cal-layout{flex:1;overflow:hidden;min-height:0;display:none}
.cal-sb{width:220px;min-width:220px;background:#fff;border-right:1px solid rgba(0,178,170,.15);display:flex;flex-direction:column;overflow:hidden}
.cal-sb-head{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--primary-dark);background:var(--primary-light);border-bottom:0.5px solid var(--border2)}
.cal-agent-row{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;transition:.1s;border-bottom:0.5px solid var(--border)}
.cal-agent-row:hover{background:var(--primary-light)}
.cal-agent-row.active{background:var(--primary-light);border-left:3px solid var(--primary)}
.cal-ticket-list{flex:1;overflow-y:auto;padding:6px}
.cal-ticket-list::-webkit-scrollbar{width:4px}
.cal-ticket-list::-webkit-scrollbar-thumb{background:rgba(0,178,170,.2);border-radius:4px}
.cal-tkt{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:.1s}
.cal-tkt:hover{background:var(--primary-light)}
.cal-tkt.active{background:var(--primary-light);border-color:var(--border2)}
.cal-tkt.done{opacity:.6}
.cal-main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);padding:16px}
.cal-ticket-head{margin-bottom:14px}
.cal-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start}
.cal-col{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;min-width:0;overflow:hidden;word-break:break-word}
.cal-col.revision{border:1.5px solid var(--primary)}
.cal-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cal-col-title.orig{color:var(--accent)}
.cal-col-title.rev{color:var(--primary-dark)}
.cal-q-row{margin-bottom:10px}
.cal-q-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.cal-orig-val{font-size:13px;font-weight:500;padding:4px 10px;border-radius:20px;display:inline-block}
.cal-orig-val.match{background:var(--green-bg);color:var(--green)}
.cal-orig-val.diff{background:var(--red-bg);color:var(--red)}
.cal-orig-val.neutral{background:var(--surface2);color:var(--text2)}
.cal-orig-text{font-size:12px;color:var(--text2);background:var(--surface2);padding:7px 10px;border-radius:6px;line-height:1.5;min-height:40px;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap}
.cal-conc{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.cal-conc-pct{font-family:'Nunito',sans-serif;font-size:28px;font-weight:700}
.cal-conc-bar-wrap{flex:1}
.cal-conc-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.cal-conc-fill{height:8px;border-radius:4px;transition:width .4s}
.cal-act{display:flex;gap:8px;margin-top:4px;padding:14px 16px;background:#fff;border-top:1px solid var(--border);position:sticky;bottom:0}

/* ── WBS ──────────────────────────────────────────────────── */
#screen-wbs{flex:1;overflow-y:auto;background:var(--bg);padding:20px 24px;display:none;flex-direction:column;gap:16px}
.wbs-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.wbs-table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.wbs-table{width:100%;border-collapse:collapse;font-size:12.5px}
.wbs-table th{background:var(--primary-light);color:var(--primary-dark);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--border2);text-align:left;white-space:nowrap}
.wbs-table td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:top;line-height:1.4}
.wbs-table tr:last-child td{border-bottom:none}
.wbs-table tr:hover td{background:var(--surface2)}
.wbs-table tr.editing td{background:var(--primary-light)}
.wbs-status{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.s-done{background:#DCFCE7;color:#166534}
.s-wip{background:#FEF3C7;color:#92400E}
.s-map{background:#E0E7FF;color:#3730A3}
.s-disc{background:#F0FDF4;color:#065F46}
.s-dep{background:#FEE2E2;color:#991B1B}
.s-other{background:#F3F4F6;color:#374151}
.wbs-pri-alta{color:#EF4444;font-weight:700}
.wbs-pri-alta{color:#EF4444;font-weight:700}
.wbs-pri-int{color:#F59E0B;font-weight:600}
.wbs-pri-baixa{color:#6B7280}
.wbs-edit-row{display:none;background:var(--primary-light)}
.wbs-edit-row.open{display:table-row}
.wbs-edit-form{padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.wbs-field{display:flex;flex-direction:column;gap:3px}
.wbs-field label{font-size:11px;font-weight:600;color:var(--text2)}
.wbs-field input,.wbs-field select,.wbs-field textarea{font-size:12px;padding:6px 8px;border:1px solid var(--border2);border-radius:6px;font-family:inherit;background:#fff}
.wbs-field textarea{resize:vertical;min-height:54px}
.wbs-field.full{grid-column:1/-1}
.wbs-actions-row{display:flex;gap:6px;margin-top:8px}
.wbs-add-row td{background:var(--primary-light);padding:10px 12px}
.wbs-empty{text-align:center;padding:40px;color:var(--text3)}

/* ── AUTH ──────────────────────────────────────────────────── */
.auth-locked .edit-only{opacity:.4;pointer-events:none;cursor:not-allowed}
.auth-btn{display:flex;align-items:center;gap:5px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:inherit;border:1px solid var(--border2);transition:.15s}
.auth-btn.locked{background:var(--surface2);color:var(--text2)}
.auth-btn.unlocked{background:#FEF9C3;color:#854D0E;border-color:#FDE047}
</style>
</head>

function _tok(){return(_r1+_r2).split('').reverse().join('');}

let _gistCache=null,_gistCacheTs=0;
async function loadFromGist(){
  const now=Date.now();
  if(_gistCache&&(now-_gistCacheTs)<30000) return _gistCache;
  try{
    const r=await fetch('https://api.github.com/gists/'+S.gistId,{
      headers:{'Authorization':'token '+_tok(),'Accept':'application/vnd.github.v3+json'}
    });
    const d=await r.json();
    function _parse(name,fb){
      try{return JSON.parse(d.files&&d.files[name]&&d.files[name].content||fb);}
      catch(e){return JSON.parse(fb);}
    }
    if(d.files&&d.files['calibrations.json']){
      // Formato novo: 3+ arquivos separados
      const analyses=_parse('analyses.json','{}');
      const calibs  =_parse('calibrations.json','{}');
      const wbs     =_parse('wbs.json','[]');
      const analyses_maio=_parse('analyses_maio.json','{}');
      const merged  =Object.assign({},analyses,calibs);
      merged[WBS_KEY]=Array.isArray(wbs)?wbs:[];
      merged['__maio__']=analyses_maio;
      _gistCache=merged;_gistCacheTs=now;
      return merged;
    }else{
      // Formato legado: arquivo único
      const content=d.files&&d.files['analyses.json']&&d.files['analyses.json'].content;
      if(content){_gistCache=JSON.parse(content);_gistCacheTs=now;return _gistCache;}
    }
  }catch(e){console.warn('Gist load:',e);}
  return _gistCache||null;
}

let _saveTimer=null,_pendingSave=null;
function debouncedSave(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){saveAnalysesToGist();_saveTimer=null;},1500);
}

async function _patchGist(files){
  try{
    const res=await fetch('https://api.github.com/gists/'+S.gistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+_tok(),'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify({files:files})
    });
    if(!res.ok){
      const msg=await res.text().catch(()=>res.status);
      console.error('Gist patch failed:',res.status,msg);
      toast('⚠️ Erro ao salvar no servidor ('+res.status+'). Dados salvos localmente.');
      return false;
    }
    _gistCacheTs=0;return true;
  }catch(e){console.warn('Gist patch:',e);toast('⚠️ Sem conexão — dado salvo localmente.');return false;}
}
function _onlyTickets(){const o={};Object.entries(S.analyses).forEach(function(e){if(!e[0].startsWith('_'))o[e[0]]=e[1];});return o;}
function _onlyCalib(){const o={};Object.entries(S.analyses).forEach(function(e){if(e[0].startsWith('_cal_'))o[e[0]]=e[1];});return o;}
async function saveAnalysesToGist(){
  if(!S.gistId)return;
  try{
    const r=await fetch('https://api.github.com/gists/'+S.gistId,{headers:{'Authorization':'token '+_tok(),'Accept':'application/vnd.github.v3+json'}});
    if(r.ok){const g=await r.json();const remote=JSON.parse(g.files['analyses.json'].content||'{}');Object.assign(remote,_onlyTickets());return _patchGist({'analyses.json':{content:JSON.stringify(remote)}});}
  }catch(e){console.warn('merge fetch:',e);}
  return _patchGist({'analyses.json':{content:JSON.stringify(_onlyTickets())}});
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  const gistData=await loadFromGist();
  if(gistData){
    S.analyses_maio=gistData['__maio__']||{};
    delete gistData['__maio__'];
    S.analyses=gistData;
    cacheAnalyses();
  }else{
    const cached=getCachedAnalyses();
    S.analyses=cached.fevapr||cached;
    S.analyses_maio=cached.maio||{};
  }
  renderAgentPills();
  updateProgress();
  setScreen('home');
  updateAuthUI();
  // Sync remoto a cada 60s para pegar dados de outros agentes
  setInterval(async function(){
    if(S.saving)return;
    const fresh=await loadFromGist();
    if(!fresh)return;
    const maio=fresh['__maio__']||{};
    delete fresh['__maio__'];
    // Merge remoto no local (remoto vence para chaves não editadas nesta sessão)
    let changed=false;
    Object.entries(fresh).forEach(function([k,v]){if(!S.analyses[k]){S.analyses[k]=v;changed=true;}});
    Object.entries(maio).forEach(function([k,v]){if(!S.analyses_maio[k]){S.analyses_maio[k]=v;changed=true;}});
    if(changed){cacheAnalyses();updateProgress();renderAgentPills();if(S.screen==='analyze')renderSidebar();}
  },60000);
}

function getCachedAnalyses(){
  try{const c=JSON.parse(localStorage.getItem('enotas_cache')||'{}');return c;}catch{return{};}
}
function cacheAnalyses(){localStorage.setItem('enotas_cache',JSON.stringify({fevapr:S.analyses,maio:S.analyses_maio}));}

  const tkt=curTickets()[S.agent][S.idx];
  const data={...S.form,ticketId:tkt[0],agent:S.agent,tema:tkt[1],categoria:tkt[2],period:S.period,savedAt:new Date().toISOString()};

  if(S.gistId){
    cacheAnalyses();debouncedSavePeriod();

  if(goNext&&S.idx<curTickets()[S.agent].length-1){
    S.idx++;
    S.form=curAnalyses()[curTickets()[S.agent][S.idx][0]]||{};
    renderAnalyze();
    renderSidebar();
    scrollSidebar();
  }
}

function getSelClass(key,opt){

    'Abaixo da média':'sel-abaixo','Dentro da média':'sel-dentro','Acima da média':'sel-acima'};

function selectOpt(key,val,el){

// ── EXPORT ────────────────────────────────────────────────────
function renderExport(){
  if(!S.exportPeriod)S.exportPeriod='fevapr';
  const el=document.getElementById('screen-export');
  const isM=S.exportPeriod==='maio';
  const all=isM
    ?Object.entries(S.analyses_maio).filter(function(e){return !e[0].startsWith('_');}).map(function(e){return e[1];})
    :Object.entries(S.analyses).filter(function(e){return !e[0].startsWith('_');}).map(function(e){return e[1];});
  const done=all.length;
  const total=isM?ALL_IDS_MAIO.length:ALL_IDS.length;

  // ── helpers ──────────────────────────────────────────
  function pct(n,d){return d===0?0:Math.round(n/d*100);}
  function bar(v,max,color){
    const w=max===0?0:Math.round(v/max*100);
    return`<div style="flex:1;height:6px;background:#E5E9EE;border-radius:4px;overflow:hidden"><div style="width:${w}%;height:100%;background:${color};border-radius:4px;transition:width .5s"></div></div>`;
  }
  function donut(pctVal,color,size){
    const r=34,c=2*Math.PI*r,fill=c*pctVal/100,gap=c-fill;
    return`<svg width="${size}" height="${size}" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="${r}" fill="none" stroke="#E5E9EE" stroke-width="8"/>
      <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="8"
        stroke-dasharray="${fill.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(c/4).toFixed(1)}"
        transform="rotate(-90 40 40)" stroke-linecap="round"/>
      <text x="40" y="44" text-anchor="middle" font-size="14" font-weight="700" fill="${color}" font-family="Nunito,sans-serif">${pctVal}%</text>
    </svg>`;
  }

  // ── compute metrics ──────────────────────────────────
  const q1={Sim:0,Nao:0,NI:0},q2={Sim:0,Nao:0,NA:0};
  const q3={Abaixo:0,Dentro:0,Acima:0},q5={Sim:0,Nao:0},q6={Sim:0,Nao:0,NA:0};
  const q4={Sim:0,Nao:0,NA:0};
  all.forEach(a=>{
    if(a.q1==='Sim')q1.Sim++;else if(a.q1==='Não')q1.Nao++;else if(a.q1)q1.NI++;
    if(a.q2==='Sim')q2.Sim++;else if(a.q2==='Não')q2.Nao++;else if(a.q2==='N/A')q2.NA++;
    if(a.q3&&a.q3.includes('Abaixo'))q3.Abaixo++;else if(a.q3&&a.q3.includes('Dentro'))q3.Dentro++;else if(a.q3&&a.q3.includes('Acima'))q3.Acima++;
    if(a.q5==='Sim')q5.Sim++;else if(a.q5==='Não')q5.Nao++;
    if(a.q6==='Sim')q6.Sim++;else if(a.q6==='Não')q6.Nao++;else if(a.q6==='N/A')q6.NA++;
    // q4: novo formato (Sim/Não/N/A) ou legado (texto livre = identificado)
    if(a.q4==='Sim')q4.Sim++;
    else if(a.q4==='Não')q4.Nao++;
    else if(a.q4==='N/A')q4.NA++;
    else if(a.q4&&a.q4.trim())q4.Sim++; // legado: texto = identificado
  });

  const pCR=pct(q1.Sim,done);
  const macroDenom=q2.Sim+q2.Nao; // exclui N/A do denominador
  const pMacro=pct(q2.Sim,macroDenom||done);
  const pEsc=pct(q5.Sim,done);
  const matDenom=q4.Sim+q4.Nao; // exclui N/A do denominador
  const pMat=pct(q4.Sim,matDenom||done);
  const escN3Denom=q6.Sim+q6.Nao; // exclui N/A do denominador

function exportCSV(agentFilter,onlyDone=false){
  const headers=['Ticket ID','Agente','Tema','Categoria','Período','Contact Reason Correto','Macros Utilizadas','Tempo vs FR',
    'Material de Consulta','Escalonamento N1→N2','Justificativa N1→N2','Escalonamento N2→N3','Justificativa N2→N3','Observações','Salvo em'];
  function makeRows(srcT,srcA,agOf,periodo){
    const tks=agentFilter?(srcT[agentFilter]||[]):Object.values(srcT).flat();
    const filtered=onlyDone?tks.filter(t=>srcA[t[0]]):tks;
    return filtered.map(([id,tema,cat])=>{
      const a=srcA[id];
      if(!a)return[id,agOf[id],tema,cat,periodo,'','','','','','','','','',''].map(csvE).join(',');
      const matExp=a.q4_material||(a.q4==='Não'||a.q4==='N/A'?a.q4:a.q4||'');
      return[id,a.agent,a.tema,a.categoria,periodo,a.q1||'',a.q2||'',a.q3||'',matExp,a.q5||'',a.q5j||'',a.q6||'',a.q6j||'',a.obs||'',a.savedAt||''].map(csvE).join(',');
    });
  }
  const rows=makeRows(TICKETS,S.analyses,AGENT_OF,'Fev-Abr').concat(makeRows(TICKETS_MAIO,S.analyses_maio,AGENT_OF_MAIO,'Maio'));
  const csv='\uFEFF'+headers.map(csvE).join(',')+'\n'+rows.join('\n');
  const name=agentFilter?`eNotas_GC_${agentFilter}_${today()}.csv`:`eNotas_GC_Compilado_${today()}.csv`;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
  toast('Download iniciado!');
}
function csvE(v){
  const s=String(v==null?'':v);
  return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;
}
function today(){return new Date().toISOString().slice(0,10);}

function downloadXLSX(){
  const safe=v=>v==null?'':String(v);

  function buildSheet(rows2d){
    return XLSX.utils.aoa_to_sheet(rows2d.map(function(r){
      return r.map(function(v){return safe(v);});
    }));
  }

  function generate(){
    // Combina os dois períodos
    const h1=['Ticket ID','Agente GC','Tema','Categoria','Período',
      'Analista N1','Analista N2',
      'Contact Reason Correto','Macros Utilizadas','Tempo vs FR',
      'Material de Consulta','Escalonamento N1-N2','Justificativa N1-N2',
      'Escalonamento N2-N3','Justificativa N2-N3','Observacoes','Salvo em'];
    function toRow(a,periodo){
      const an=periodo==='Maio'?ANALYSTS_MAIO[String(a.ticketId)]:null;
      return[a.ticketId,a.agent,a.tema,a.categoria,periodo,
        an?an.n1:'',an?an.n2:'',
        a.q1,a.q2,a.q3,a.q4_material||(a.q4==='Não'||a.q4==='N/A'?a.q4:a.q4||''),a.q5,a.q5j,a.q6,a.q6j,a.obs,a.savedAt];
    }
    const analisesFevAbr=Object.values(S.analyses).filter(function(a){return a&&typeof a==='object'&&!Array.isArray(a)&&a.ticketId&&!a.reviewer;});
    const analisesMaio=Object.values(S.analyses_maio).filter(function(a){return a&&typeof a==='object'&&!Array.isArray(a)&&a.ticketId&&!a.reviewer;});
    const r1=analisesFevAbr.map(function(a){return toRow(a,'Fev-Abr');})
              .concat(analisesMaio.map(function(a){return toRow(a,'Maio');}));

    const h2=['Revisor','Ticket ID','Analista Original','Tema','Categoria','Período',
      'CR Correto (Revisao)','Macros (Revisao)','Tempo vs FR (Revisao)',
      'Material (Revisao)','Escal. N1-N2 (Revisao)','Justif. N1-N2 (Revisao)',
      'Escal. N2-N3 (Revisao)','Justif. N2-N3 (Revisao)','Obs (Revisao)',
      'CR Correto (Original)','Macros (Original)','Tempo vs FR (Original)',
      'Escal. N1-N2 (Original)','Escal. N2-N3 (Original)',
      'Concordancia (%)','Salvo em'];
    function toCalRow(rev,srcA,periodo){
      const tid=String(rev.ticketId);
      const orig=srcA[tid]||{};
      const conc=calcConc(orig,rev);
      return[rev.reviewer,rev.ticketId,orig.agent||'',orig.tema||'',orig.categoria||'',periodo,
        rev.q1,rev.q2,rev.q3,rev.q4,rev.q5,rev.q5j,rev.q6,rev.q6j,rev.obs,
        orig.q1,orig.q2,orig.q3,orig.q5,orig.q6,
        conc.total?conc.pct+'%':'',rev.savedAt];
    }
    const calFevAbr=Object.values(S.analyses).filter(function(a){return a&&typeof a==='object'&&!Array.isArray(a)&&!!a.reviewer;});
    const calMaio=Object.values(S.analyses_maio).filter(function(a){return a&&typeof a==='object'&&!Array.isArray(a)&&!!a.reviewer;});
    const r2=calFevAbr.map(function(rev){return toCalRow(rev,S.analyses,'Fev-Abr');})
              .concat(calMaio.map(function(rev){return toCalRow(rev,S.analyses_maio,'Maio');}));

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, buildSheet([h1].concat(r1)), 'Analises');
    XLSX.utils.book_append_sheet(wb, buildSheet([h2].concat(r2)), 'Calibragem');

    const b64=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    const a=document.createElement('a');
    a.href='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+b64;
    a.download='eNotas_GC_'+new Date().toISOString().slice(0,10)+'.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('Download iniciado! '+(r1.length)+' analises + '+(r2.length)+' calibragens');
  }

  if(typeof XLSX==='undefined'){
    toast('Carregando...');
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=generate;
    s.onerror=function(){toast('Erro ao carregar biblioteca XLSX');};
    document.head.appendChild(s);
  }else{
    generate();
  }
}

let toastTimer;
function toast(msg,cls='t-ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+cls+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='toast',2500);
}

// ── TOOLTIP ──────────────────────────────────────────────────
function showTip(e,text,el){
  let tip=document.getElementById('_tip');
  if(!tip){tip=document.createElement('div');tip.id='_tip';
    tip.style.cssText='position:fixed;background:#1A1A2E;color:#fff;font-size:12px;padding:6px 10px;border-radius:6px;pointer-events:none;z-index:9999;max-width:300px;line-height:1.4;box-shadow:0 4px 12px rgba(0,0,0,.25)';
    document.body.appendChild(tip);}
  tip.textContent=text;
  const r=el.getBoundingClientRect();
  tip.style.left=r.left+'px';
  tip.style.top=(r.top-38)+'px';
  tip.style.display='block';
}
function hideTip(){const t=document.getElementById('_tip');if(t)t.style.display='none';}
// Event delegation for tip triggers
document.addEventListener('mouseover',function(e){
  const el=e.target.closest('._tip-trigger');
  if(el&&el.dataset.tip)showTip(e,el.dataset.tip,el);
});
document.addEventListener('mouseout',function(e){
  if(e.target.closest('._tip-trigger'))hideTip();
});

  'Alê':{orig:'Calais',tickets:[10397171,10435937,10462106,10508903,10541589,10550322,10583643,10652773,10728732,10809228]},
  'Calais':{orig:'Rapha',tickets:[10407003,10445994,10500538,10559633,10629466,10661292,10700201,10731863,10776348,10809304]},
  'Rapha':{orig:'Alê',tickets:[10376123,10445235,10509587,10549846,10580006,10626072,10652897,10742836,10775543,10836897]}
};

// 5 tickets cruzados de Maio (Alê→Calais, Calais→Rapha, Rapha→Alê)
const CALIBRATION_MAIO={
  'Alê':{orig:'Calais',tickets:[10965378,10770777,10934530,11035639,10780760]},
  'Calais':{orig:'Rapha',tickets:[10808459,10743791,10954244,10911337,10955003]},
  'Rapha':{orig:'Alê',tickets:[11006380,10781403,10828960,10748957,10963946]}
};

let SC={agent:null,idx:0,form:{}};

function calKey(agent,tid){return '_cal_'+agent+'_'+tid;}
function calKeyMaio(agent,tid){return '_cal_maio_'+agent+'_'+tid;}
function curCalibration(){return S.period==='maio'?CALIBRATION_MAIO:CALIBRATION;}
function curCalKey(agent,tid){return S.period==='maio'?calKeyMaio(agent,tid):calKey(agent,tid);}
function curCalAnalyses(){return S.period==='maio'?S.analyses_maio:S.analyses;}
function calTotal(){return S.period==='maio'?5:10;}
function calDone(agent){
  const cal=curCalibration()[agent];if(!cal)return 0;
  const src=curCalAnalyses();
  return cal.tickets.filter(t=>src[curCalKey(agent,t)]).length;
}

function calcConc(orig,rev){
  const qs=['q1','q2','q3','q4','q5','q6'];
  const ans=qs.filter(q=>orig&&orig[q]&&rev&&rev[q]);
  if(!ans.length)return{pct:0,matched:0,total:0};
  const m=ans.filter(q=>orig[q]===rev[q]).length;
  return{pct:Math.round(m/ans.length*100),matched:m,total:ans.length};
}
function concColor(p){return p>=75?'var(--green)':'var(--red)';}

function switchTab(tab){
  ['analyze','calibration','export'].forEach(t=>{
    document.getElementById('tab-'+t)?.classList.toggle('active',t===tab);
  });
  const ml=document.getElementById('main-layout');
  const cl=document.getElementById('cal-layout');
  if(tab==='calibration'){
    ml.style.display='none'; cl.style.display='flex';
    renderCalAgents();
  } else {
    cl.style.display='none'; ml.style.display='flex';
    if(tab==='analyze') setScreen(S.agent?'analyze':'home');
    if(tab==='export')  setScreen('export');
  }
}
function openCalibration(agent){
  SC.agent=agent;
  const cal=curCalibration()[agent];
  const src=curCalAnalyses();
  const pending=cal.tickets.findIndex(function(t){return !src[curCalKey(agent,t)];});
  SC.idx=pending>=0?pending:0;
  SC.form=Object.assign({},src[curCalKey(agent,cal.tickets[SC.idx])]||{});
  // Show cal-layout, hide main-layout
  const ml=document.getElementById('main-layout');
  const cl=document.getElementById('cal-layout');
  if(ml) ml.style.display='none';
  if(cl) cl.style.display='flex';
  // Update back button
  const bb=document.getElementById('back-btn');
  if(bb){
    bb.style.display='flex';
    bb.textContent='← Análise';
    bb.onclick=function(){
      if(ml) ml.style.display='flex';
      if(cl) cl.style.display='none';
      SC.agent=null;
      setScreen(S.agent?'analyze':'home');
      renderAgentPills();
    };
  }
  renderCalSidebar();
  renderCalForm();
}

    const a=entry[0],c=entry[1];

  h+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--primary-dark);padding:8px 6px 4px;cursor:pointer" onclick="SC.agent=null;renderCalAgents()">← Revisores</div>';

    const isDone=!!calSrc[curCalKey(SC.agent,tid)],active=i===SC.idx;
    const bg=active?'background:var(--primary-light);border-left:3px solid var(--primary);':'';

    h+='<span class="sb-id" style="pointer-events:none">'+tid+'</span>';
    if(isDone)h+='<span style="font-size:10px;color:var(--green);pointer-events:none">✓</span>';
    h+='</div>';
  });
  // Botão de média de concordância (só aparece quando todas 10 estão feitas)
  if(allDone){
    const avg=agentCalConcordance(SC.agent);
    const color=avg>=80?'var(--green)':avg>=60?'var(--yellow)':'var(--red)';
    h+='<div style="margin-top:10px;padding:10px 8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border2)">';
    h+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:6px">Média de Concordância</div>';

function agentCalConcordance(agent){
  const cal=curCalibration()[agent];if(!cal)return null;
  const src=curCalAnalyses();
  const results=cal.tickets.map(function(tid){
    const orig=src[String(tid)]||null;
    const rev=src[curCalKey(agent,tid)]||null;
    return calcConc(orig,rev);
  }).filter(function(c){return c.total>0;});
  if(!results.length)return null;
  return Math.round(results.reduce(function(s,c){return s+c.pct;},0)/results.length);
}

function jumpCal(i){
  const cal=curCalibration()[SC.agent];
  SC.idx=i;
  SC.form=Object.assign({},curCalAnalyses()[curCalKey(SC.agent,cal.tickets[i])]||{});
  renderCalSidebar();
  renderCalForm();
}

function setCalQ(q,val){
  if(SC.form[q]===val){SC.form[q]=null;}else{SC.form[q]=val;}
  const cal=curCalibration()[SC.agent];
  const tid=cal.tickets[SC.idx];
  const orig=curCalAnalyses()[String(tid)]||{};
  document.querySelectorAll('[data-calq="'+q+'"]').forEach(function(r){
    const o=r.dataset.calopt;
    r.className='ropt';
    if(SC.form[q]===o){
      if(q==='q3') r.className='ropt '+q3Class(o);
      else if(orig[q]&&orig[q]===o) r.className='ropt sel-sim';
      else if(orig[q]&&orig[q]!==o) r.className='ropt sel-nao';
      else r.className='ropt sel-gen';
    }
  });
  // update concordance display
  const rev=SC.form;
  const conc=calcConc(orig,rev);
  const pctEl=document.getElementById('cal-conc-pct');
  const barEl=document.getElementById('cal-conc-fill');
  const lblEl=document.getElementById('cal-conc-lbl');
  if(pctEl) pctEl.textContent=conc.total?conc.pct+'%':'—';
  if(pctEl) pctEl.style.color=concColor(conc.pct);
  if(barEl){ barEl.style.width=conc.pct+'%'; barEl.style.background=concColor(conc.pct); }
  if(lblEl) lblEl.textContent=conc.total?conc.matched+' de '+conc.total+' perguntas concordantes':'Preencha a revisão para ver a concordância';
}
async function saveCalibration(goNext=true){
  if(!_auth){requireAuth(function(){saveCalibration(goNext);});return;}
  const cal=curCalibration()[SC.agent];
  const tid=cal.tickets[SC.idx];
  const key=curCalKey(SC.agent,tid);
  SC.form.reviewer=SC.agent;SC.form.ticketId=tid;SC.form.period=S.period;SC.form.savedAt=new Date().toISOString();
  curCalAnalyses()[key]=Object.assign({},SC.form);
  cacheAnalyses();
  renderCalSidebar();
  if(S.gistId){
    if(S.period==='maio') saveMaioAnalysesToGist();
    else saveCalibrationsToGist();
  }
  toast('Revisão salva ✓');
  const maxIdx=cal.tickets.length-1;
  if(goNext&&SC.idx<maxIdx){
    SC.idx++;
    SC.form=Object.assign({},curCalAnalyses()[curCalKey(SC.agent,cal.tickets[SC.idx])]||{});
    renderCalForm();
    renderCalSidebar();
  }
}
// ── WBS ──────────────────────────────────────────────────────
const WBS_KEY='_wbs_actions';

function wbsScore(impacto,esforco){
  var iv=parseInt((impacto||'0').split('[')[0].trim())||0;
  var ev=parseInt((esforco||'0').split('[')[0].trim())||0;
  return iv*ev;
}
function wbsPriority(score){
  if(score===0)return{label:'—',cls:'s-other'};
  if(score>=17)return{label:'Alta',cls:'wbs-pri-alta'};
  if(score>=9) return{label:'Intermediária',cls:'wbs-pri-int'};
  return{label:'Baixa',cls:'wbs-pri-baixa'};
}
const STATUS_OPTS=['Mapeada','Work in progress','Discovery','Testing','Done','Deprioritized'];
const IMPACT_OPTS=['0 [Indeterminado]','1 [Muito alto]','2 [Baixo]','3 [Médio]','4 [Alto]','5 [Muito Alto]'];
const EFFORT_OPTS=['0 [Não definido]','1 [Muito alto]','2 [Alto]','3 [Médio]','4 [Baixo]','5 [Muito baixo]'];

function getWBS(){return S.analyses[WBS_KEY]||[];}
function saveWBS(list){
  S.analyses[WBS_KEY]=list;
  cacheAnalyses();
  if(S.gistId){
    saveWBSToGist().then(function(ok){
      toast(ok?'WBS salvo ✓':'WBS salvo localmente — verifique conexão');
    });
  }else{
    toast('WBS salvo localmente ✓');
  }
}

function statusClass(s){
  if(!s)return 's-other';
  if(s==='Done')return 's-done';
  if(s==='Work in progress')return 's-wip';
  if(s==='Mapeada'||s==='Mapeamento')return 's-map';
  if(s==='Discovery')return 's-disc';
  if(s==='Deprioritized')return 's-dep';
  return 's-other';
}

function renderWBS(){
  var el=document.getElementById('screen-wbs');
  el.style.display='flex';
  const MONTHS_PT={'jan':1,'fev':2,'mar':3,'abr':4,'mai':5,'jun':6,'jul':7,'ago':8,'set':9,'out':10,'nov':11,'dez':12};
  function prazoOrder(p){if(!p)return 9999;const m=p.trim().toLowerCase().slice(0,3);return MONTHS_PT[m]||9999;}
  var list=getWBS().slice().sort(function(a,b){return prazoOrder(a.prazo)-prazoOrder(b.prazo);});
  var sb=document.getElementById('sidebar');
  if(sb) sb.style.display='none';
  var bb=document.getElementById('back-btn');
  if(bb){bb.style.display='flex';bb.textContent='← Início';bb.onclick=function(){setScreen('home');};}

  var rows=list.map(function(a,i){
    var sc=statusClass(a.status);
    var priCls=a.prioridade==='Alta'?'wbs-pri-alta':'wbs-pri-baixa';
    return '<tr id="wbs-row-'+i+'" style="cursor:pointer" onclick="toggleWBSEdit('+i+')">'
      +'<td style="min-width:200px;font-weight:500">'+escHtml(a.n4||'—')+'</td>'
      +'<td style="color:var(--text2)">'+escHtml(a.n1||'')+'</td>'
      +'<td style="color:var(--text2)">'+escHtml(a.n3||'')+'</td>'
      +'<td>'+escHtml(a.impactoPrincipal||'')+'</td>'
      +'<td>'+escHtml(a.responsavel||'')+'</td>'
      +(function(){var sc=wbsScore(a.impacto,a.esforco);var p=wbsPriority(sc);
  return '<td><span class="'+p.cls+'">'+p.label+(sc>0?' ('+sc+')':'')+'</span></td>';})()
      +'<td><span class="wbs-status '+sc+'">'+escHtml(a.status||'')+'</span></td>'
      +'<td style="color:var(--text3);white-space:nowrap">'+escHtml(a.prazo||'')+'</td>'
      +'<td style="text-align:center"><button class="btn btn-ghost" style="font-size:11px;padding:3px 8px" onclick="event.stopPropagation();deleteWBS('+i+')">✕</button></td>'
      +'</tr>'
      +'<tr id="wbs-edit-'+i+'" class="wbs-edit-row"><td colspan="9">'+wbsEditForm(a,i)+'</td></tr>';
  }).join('');

  el.innerHTML='<div class="wbs-topbar">'
    +'<div><div style="font-size:18px;font-weight:700;color:var(--primary)">Plano de Ação — WBS</div>'
    +'<div style="font-size:12px;color:var(--text3)">'+list.length+' ações cadastradas · clique em uma linha para editar</div></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-outline" style="font-size:12px" onclick="exportWBSCSV()">⬇ Exportar CSV</button>'
    +'<button class="btn btn-teal" style="font-size:12px" onclick="addWBSAction()">+ Nova ação</button>'
    +'</div></div>'
    +'<div class="wbs-table-wrap"><table class="wbs-table"><thead><tr>'
    +'<th>Ação (N4)</th><th>Categoria (N1)</th><th>Tema (N3)</th><th>Impacto Principal</th>'
    +'<th>Responsável</th><th>Prioridade</th><th>Status</th><th>Prazo</th><th></th>'
    +'</tr></thead><tbody id="wbs-tbody">'
    +(rows||'<tr><td colspan="9" class="wbs-empty">Nenhuma ação cadastrada. Clique em "+ Nova ação" para começar.</td></tr>')
    +'</tbody></table></div>';
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function wbsEditForm(a,i){
  var opts=function(arr,val){
    return arr.map(function(o){
      return '<option value="'+escHtml(o)+'"'+(o===val?' selected':'')+'>'+escHtml(o)+'</option>';
    }).join('');
  };
  return '<div class="wbs-edit-form">'
    +'<div class="wbs-field full"><label>Ação (N4)</label><input id="wf-n4-'+i+'" value="'+escHtml(a.n4||'')+'"/></div>'
    +'<div class="wbs-field"><label>Categoria N1</label><input id="wf-n1-'+i+'" value="'+escHtml(a.n1||'')+'"/></div>'
    +'<div class="wbs-field"><label>Subcategoria N2</label><input id="wf-n2-'+i+'" value="'+escHtml(a.n2||'')+'"/></div>'
    +'<div class="wbs-field"><label>Tema N3</label><input id="wf-n3-'+i+'" value="'+escHtml(a.n3||'')+'"/></div>'
    +'<div class="wbs-field"><label>Impacto Principal</label><input id="wf-imp-'+i+'" value="'+escHtml(a.impactoPrincipal||'')+'"/></div>'
    +'<div class="wbs-field"><label>Equipe</label><select id="wf-eq-'+i+'"><option value=""></option>'
    +['CX Support','CX Ops','Internal Products','Produto','PMM','Outros','Sustain'].map(function(o){return '<option value="'+o+'"'+(a.equipe===o?' selected':'')+'>'+o+'</option>';}).join('')
    +'</select></div>'
    +'<div class="wbs-field"><label>Responsável</label><input id="wf-resp-'+i+'" value="'+escHtml(a.responsavel||'')+'"/></div>'
    +'<div class="wbs-field"><label>Impacto</label><select id="wf-impval-'+i+'"><option value=""></option>'+opts(IMPACT_OPTS,a.impacto)+'</select></div>'
    +'<div class="wbs-field"><label>Esforço</label><select id="wf-esf-'+i+'"><option value=""></option>'+opts(EFFORT_OPTS,a.esforco)+'</select></div>'
    +(function(){var sc=wbsScore(a.impacto,a.esforco);var p=wbsPriority(sc);
  return '<div class="wbs-field"><label>Prioridade (calculada)</label>'
    +'<div style="padding:6px 10px;background:#F8F9FB;border:1px solid var(--border2);border-radius:6px;font-size:12px;font-weight:600" class="'+p.cls+'">'+p.label+(sc>0?' — Score: '+sc+'/25':'— preencha impacto e esforço')+'</div></div>';
})()
    +'<div class="wbs-field"><label>Status</label><select id="wf-st-'+i+'"><option value=""></option>'+opts(STATUS_OPTS,a.status)+'</select></div>'
    +'<div class="wbs-field"><label>Prazo estimado</label><input id="wf-prazo-'+i+'" value="'+escHtml(a.prazo||'')+'"/></div>'
    +'<div class="wbs-field full"><label>Detalhamento</label><textarea id="wf-det-'+i+'">'+escHtml(a.detalhamento||'')+'</textarea></div>'
    +'<div class="wbs-actions-row">'
    +'<button class="btn btn-teal" style="font-size:12px" onclick="saveWBSRow('+i+')">Salvar</button>'
    +'<button class="btn btn-outline" style="font-size:12px" onclick="toggleWBSEdit('+i+')">Cancelar</button>'
    +'</div></div>';
}

function toggleWBSEdit(i){
  var row=document.getElementById('wbs-edit-'+i);
  if(row) row.classList.toggle('open');
}

function saveWBSRow(i){
  if(!_auth){requireAuth(function(){saveWBSRow(i);});return;}
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  var list=getWBS();
  list[i]={
    n4:g('wf-n4-'+i),n1:g('wf-n1-'+i),n2:g('wf-n2-'+i),n3:g('wf-n3-'+i),
    impactoPrincipal:g('wf-imp-'+i),equipe:g('wf-eq-'+i),responsavel:g('wf-resp-'+i),
    impacto:g('wf-impval-'+i),esforco:g('wf-esf-'+i),prioridade:'',// calculada automaticamente via score

    status:g('wf-st-'+i),prazo:g('wf-prazo-'+i),detalhamento:g('wf-det-'+i),
    updatedAt:new Date().toISOString()
  };
  if(!list[i].createdAt) list[i].createdAt=list[i].updatedAt;
  delete list[i]._unsaved;
  saveWBS(list);
  renderWBS();
}

function addWBSAction(){
  if(!_auth){requireAuth(addWBSAction);return;}
  var list=getWBS();
  list.push({n4:'',n1:'',n2:'',n3:'',impactoPrincipal:'',equipe:'',responsavel:'',
    impacto:'',esforco:'',prioridade:'',status:'Mapeada',prazo:'',detalhamento:'',
    createdAt:new Date().toISOString(),_unsaved:true});
  // NÃO salva no Gist ainda — só atualiza estado local e UI
  S.analyses[WBS_KEY]=list;
  cacheAnalyses();
  renderWBS();
  setTimeout(function(){toggleWBSEdit(list.length-1);},50);
}

function deleteWBS(i){
  if(!_auth){requireAuth(function(){deleteWBS(i);});return;}
  if(!confirm('Excluir esta ação?')) return;
  var list=getWBS();
  var wasUnsaved=list[i]&&list[i]._unsaved;
  list.splice(i,1);
  if(wasUnsaved){
    // Item nunca foi salvo no Gist — só remove local
    S.analyses[WBS_KEY]=list;cacheAnalyses();renderWBS();
  }else{
    saveWBS(list);renderWBS();
  }
}

function exportWBSCSV(){
  var esc=function(v){
    var s=v==null?'':String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  };
  var headers=['Ação (N4)','N1','N2','N3','Impacto Principal','Equipe','Responsável',
    'Impacto','Esforço','Prioridade','Status','Prazo','Detalhamento','Criado em','Atualizado em'];
  var list=getWBS();
  var rows=list.map(function(a){
    return[a.n4,a.n1,a.n2,a.n3,a.impactoPrincipal,a.equipe,a.responsavel,
      a.impacto,a.esforco,a.prioridade,a.status,a.prazo,a.detalhamento,a.createdAt,a.updatedAt
    ].map(esc).join(',');
  });
  var csv='\uFEFF'+headers.map(esc).join(',')+'\n'+rows.join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='WBS_eNotas_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('WBS exportado! ('+list.length+' ações)');
}

const _ap1='6202@e',_ap2='silanA';
function _pwd(){return(_ap1+_ap2).split('').reverse().join('');}
let _auth=false;

function requireAuth(callback){
  if(_auth){callback();return;}
  const pwd=prompt('🔒 Digite a senha para editar:');
  if(pwd===null)return;
  if(pwd===_pwd()){
    _auth=true;
    updateAuthUI();
    toast('Modo edição ativado ✓');
    callback();
  }else{
    toast('Senha incorreta.');
  }
}

function toggleAuth(){
  if(_auth){
    _auth=false;
    updateAuthUI();
    toast('Modo leitura ativado');
  }else{
    const pwd=prompt('Digite a senha para habilitar edições:');
    if(pwd===null)return;
    if(pwd===_pwd()){
      _auth=true;
      updateAuthUI();
      toast('Modo edição ativado ✓');
    }else{
      toast('Senha incorreta.');
    }
  }
}

function updateAuthUI(){
  const btn=document.getElementById('auth-btn');
  if(!btn)return;
  const lockSVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
  const unlockSVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>';
  if(_auth){
    btn.innerHTML=unlockSVG+'Edição';
    btn.className='auth-btn unlocked';
  }else{
    btn.innerHTML=lockSVG+'Leitura';
    btn.className='auth-btn locked';
  }
  // Toggle edit-only elements
  document.body.classList.toggle('auth-locked',!_auth);
  // Re-render analyst N1/N2 field if on analyze screen
  if(S.screen==='analyze'&&S.agent)renderAnalyze();
}
